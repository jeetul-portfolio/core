name: Build, Push, Generate YAML, Notify ArgoCD

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SERVICE_NAME: ${{ github.event.repository.name }}
  DOCKER_REGISTRY: ${{ vars.ORG_DOCKER_REGISTRY }}
  DOCKER_REGISTRY_USERNAME: ${{ secrets.ORG_DOCKER_REGISTRY_USERNAME }}
  DOCKER_REGISTRY_PASSWORD: ${{ secrets.ORG_DOCKER_REGISTRY_PASSWORD }}
  DOCKER_REPO_PRIVATE: ${{ vars.ORG_DOCKER_REPO_PRIVATE || 'false' }}
  IMAGE_REPOSITORY: ${{ format('{0}/{1}/{2}', vars.ORG_DOCKER_NAMESPACE, vars.ORG_IMAGE_NAMESPACE, github.event.repository.name) }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.semver.outputs.version }}
      app_version_compact: ${{ steps.version_tag.outputs.version_compact }}
      image_ref: ${{ steps.export_image.outputs.image_ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Resolve version bump type
        id: bump
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          BUMP_TYPE="patch"

          if echo "$COMMIT_MESSAGE" | grep -qi "tag-major"; then
            BUMP_TYPE="major"
          elif echo "$COMMIT_MESSAGE" | grep -qi "tag-minor"; then
            BUMP_TYPE="minor"
          elif echo "$COMMIT_MESSAGE" | grep -qi "tag-patch"; then
            BUMP_TYPE="patch"
          fi

          echo "bump_type=${BUMP_TYPE}" >> "$GITHUB_OUTPUT"

      - name: Bump package version
        id: semver
        run: |
          npm version "${{ steps.bump.outputs.bump_type }}" --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build compact version tag
        id: version_tag
        run: |
          VERSION_COMPACT=$(echo "${{ steps.semver.outputs.version }}" | tr -d '.')
          if [ -z "$VERSION_COMPACT" ]; then
            echo "Version compact tag is empty"
            exit 1
          fi
          echo "version_compact=${VERSION_COMPACT}" >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add package.json package-lock.json

          if git diff --cached --quiet; then
            echo "No version change to commit."
            exit 0
          fi

          git commit -m "ci: bump version to v${{ steps.semver.outputs.version }} [skip ci]"
          git push

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ env.DOCKER_REGISTRY_USERNAME }}
          password: ${{ env.DOCKER_REGISTRY_PASSWORD }}

      - name: Ensure Docker repository exists
        env:
          DOCKER_REGISTRY: ${{ env.DOCKER_REGISTRY }}
          DOCKER_IMAGE_REPOSITORY: ${{ env.IMAGE_REPOSITORY }}
          DOCKER_REGISTRY_USERNAME: ${{ env.DOCKER_REGISTRY_USERNAME }}
          DOCKER_REGISTRY_PASSWORD: ${{ env.DOCKER_REGISTRY_PASSWORD }}
          DOCKER_REPO_PRIVATE: ${{ env.DOCKER_REPO_PRIVATE }}
        run: |
          if [ "$DOCKER_REGISTRY" != "docker.io" ] && [ "$DOCKER_REGISTRY" != "index.docker.io" ]; then
            echo "Skipping Docker Hub repository creation for registry: $DOCKER_REGISTRY"
            exit 0
          fi

          FULL_REPO="$DOCKER_IMAGE_REPOSITORY"
          if [[ "$FULL_REPO" == *"/"* ]]; then
            NAMESPACE="${FULL_REPO%%/*}"
            REPOSITORY_NAME="${FULL_REPO#*/}"
          else
            NAMESPACE="$DOCKER_REGISTRY_USERNAME"
            REPOSITORY_NAME="$FULL_REPO"
          fi

          REPOSITORY_NAME_ENCODED=$(printf '%s' "$REPOSITORY_NAME" | sed 's#/#%2F#g')

          LOGIN_PAYLOAD=$(printf '{"username":"%s","password":"%s"}' "$DOCKER_REGISTRY_USERNAME" "$DOCKER_REGISTRY_PASSWORD")
          TOKEN=$(curl --silent --show-error --fail \
            --request POST \
            --header "Content-Type: application/json" \
            --data "$LOGIN_PAYLOAD" \
            "https://hub.docker.com/v2/users/login/" | sed -n 's/.*"token":"\([^"]*\)".*/\1/p')

          if [ -z "$TOKEN" ]; then
            echo "Unable to authenticate to Docker Hub API."
            exit 1
          fi

          STATUS_CODE=$(curl --silent --output /dev/null --write-out "%{http_code}" \
            --header "Authorization: JWT $TOKEN" \
            "https://hub.docker.com/v2/repositories/${NAMESPACE}/${REPOSITORY_NAME_ENCODED}/")

          if [ "$STATUS_CODE" = "200" ]; then
            echo "Docker Hub repository already exists: ${NAMESPACE}/${REPOSITORY_NAME}"
            exit 0
          fi

          if [ "$STATUS_CODE" != "404" ]; then
            echo "Unexpected Docker Hub API response while checking repository: HTTP $STATUS_CODE"
            exit 1
          fi

          REPO_PRIVATE="${DOCKER_REPO_PRIVATE:-false}"
          CREATE_PAYLOAD=$(printf '{"namespace":"%s","name":"%s","is_private":%s}' "$NAMESPACE" "$REPOSITORY_NAME" "$REPO_PRIVATE")

          curl --silent --show-error --fail \
            --request POST \
            --header "Authorization: JWT $TOKEN" \
            --header "Content-Type: application/json" \
            --data "$CREATE_PAYLOAD" \
            "https://hub.docker.com/v2/repositories/" >/dev/null

          echo "Created Docker Hub repository: ${NAMESPACE}/${REPOSITORY_NAME}"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_REPOSITORY }}:${{ steps.version_tag.outputs.version_compact }}
            ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_REPOSITORY }}:sha-${{ github.sha }}
            ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_REPOSITORY }}:latest

      - name: Export image reference (version tag)
        id: export_image
        run: |
          IMAGE_REF="${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_REPOSITORY }}:${{ steps.version_tag.outputs.version_compact }}"
          echo "image_ref=${IMAGE_REF}" >> "$GITHUB_OUTPUT"

  generate-and-commit-manifests:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync to latest branch head
        run: |
          git checkout "${GITHUB_REF_NAME}"
          git pull origin "${GITHUB_REF_NAME}"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Update image in deploy/services.json
        env:
          IMAGE_REF: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_REPOSITORY }}:${{ needs.build-and-push.outputs.app_version_compact }}
        run: |
          node -e '
          const fs = require("fs");
          const path = "deploy/services.json";

          if (!process.env.IMAGE_REF) {
            throw new Error("IMAGE_REF is empty. Check build-and-push job outputs and registry variables.");
          }

          const config = JSON.parse(fs.readFileSync(path, "utf8"));
          if (!Array.isArray(config.deployments) || config.deployments.length === 0) {
            throw new Error("services.json must contain deployments array");
          }

          config.deployments = config.deployments.map((deployment, index) => {
            if (!deployment || typeof deployment !== "object") {
              throw new Error(`Deployment at index ${index} is not a valid object.`);
            }
            if (!deployment.name) {
              throw new Error(`Deployment at index ${index} is missing name.`);
            }
            if (!deployment.containerPort) {
              throw new Error(`Deployment at index ${index} (${deployment.name}) is missing containerPort.`);
            }

            return {
              ...deployment,
              image: process.env.IMAGE_REF,
            };
          });

          fs.writeFileSync(path, JSON.stringify(config, null, 2) + "\n");
          '

      - name: Generate deployment files
        run: npm run generate:deploy-yamls

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add deploy/services.json deploy/ymls

          if git diff --cached --quiet; then
            echo "No manifest changes to commit."
            exit 0
          fi

          git commit -m "ci: update image and generated kubernetes manifests [skip ci]"
          git push

